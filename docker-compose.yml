services:
  db:
    image: postgres:16
    ports:
      - "15432:5432"  # доступ с хоста (notebook); не 5432 — часто занят локальным PostgreSQL
    environment:
      POSTGRES_USER: roadmap
      POSTGRES_PASSWORD: roadmap
      POSTGRES_DB: roadmap
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadmap -d roadmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://roadmap:roadmap@db:5432/roadmap
    volumes:
      - ./data:/app/import-data:ro
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
